<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>LuxMarket Dashboard</title>
</head>
<body class="bg-slate-50 antialiased">

    <div class="min-h-screen lg:flex">
        
        <aside class="hidden lg:flex lg:flex-col lg:w-64 lg:bg-slate-900 lg:text-white lg:p-6">
            <div class="text-2xl font-bold mb-10">LuxMarket</div>
            <nav class="space-y-2">
                <a href="#" class="block p-2 bg-slate-800 rounded">Dashboard</a>
                <a href="#" class="block p-2 hover:bg-slate-800 rounded">Products</a>
            </nav>
        </aside>

        <div class="flex-1">
            <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10">
                <h1 class="text-xl font-bold">Product Inventory</h1>
                <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm">Add Product</button>
            </header>

            <main class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    
                    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-md transition">
                        <div class="h-48 bg-slate-200"></div> <div class="p-4">
                            <span class="text-xs font-bold text-indigo-600 uppercase tracking-wide">Furniture</span>
                            <h3 class="text-lg font-semibold mt-1">Minimalist Oak Chair</h3>
                            <div class="text-sm text-slate-500 line-clamp-2 mt-2">Handcrafted oak wood with ergonomic support and premium finish.</div>
                            <div class="mt-4 flex justify-between items-center">
                                <span class="text-xl font-bold">$249.00</span>
                                <span class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-1 rounded">IN STOCK</span>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

</body>
</html>
