<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an account</title>
    <script src="https://kit.fontawesome.com/beb9c9acc8.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-slate-900 to-black text-white h-screen flex items-center justify-center p-4">      
     <section class="w-full max-w-lg bg-gradient-to-br from-purple-900/70 via-gray-800 to-cyan-900/20  rounded-2xl">

        <div>
            <form class="m-5">
                <h3 class="text-2xl font-bold text-purple-400 ">Create an Acount</h3> <br><br>
                <label class="mb-20 font-medium mt-4">Username</label>
                <input class="border border-gray-900 p-4 rounded-xl block mb-5 w-90" type="Name" placeholder="Create username" required>
                <label class="mb-20 font-medium mt-4">Emali </label>
                <input class="border border-gray-900 rounded-xl p-4 block mb-5 w-90" type="Email" placeholder="name@gmail.com" required>
                <label class="mb-20 font-medium mt-4">Create Password</label>
                <input class="border border-gray-900 rounded-xl p-4 block mb-5 w-90" type="password" placeholder="Enter a Strong Password" required>
         <a href="dashboard.html" class="block w-full text-center bg-gradient-to-r from-purple-500 to-cyan-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-purple-500/20 hover:opacity-90 transition cursor-pointer">
             Register Now
         </a>                   
            </form>
            
                <a href="login.html"><h2 class="mt-10 flex justify-center cursor-pointer">Already have an account</a>
            </h2>
        </div>
     </section>   
    
    
        
          
</body>
</html>
