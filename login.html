<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/beb9c9acc8.js" crossorigin="anonymous"></script>

</head>
<body class="bg-gradient-to-br from-gray-950 via-slate-900 to-black text-black h-screen flex items-center justify-center p-4">
        <input type="checkbox" id="form-swap" class="hidden peer">

    <section class="container mx-auto py-12 flex items-center justify-center ">
<div class="w-full max-w-lg border border-cyan-500/20 p-8 bg-gray-900/80 backdrop-blur-xl flex flex-col items-center ring-1 ring-cyan-500/30 rounded-2xl shadow-2xl text-white grid grid-cols-1">       
     <h2 class="text-5xl font-bold mr-40 mb-20 text-white">QUANTAX Analytics</h2>
        <div>
            <form class="">
                <label class="mr-30 font-bold ">Email/Username</label>
                <input class="px-4 py-3 border border-gray-900 rounded-xl w-full max-w-md p-5 mt-4 mr-9 shadow-xl block mb-5" type="Enter Email" placeholder="Enter Your Email Address/Username" required>
                <label class="font-bold">Password</label>
                <input class="px-4 py-3 border border-gray-900 rounded-xl w-full max-w-md p-5 mr-9 shadow-xl cursor-pointer" type="password" placeholder="Ener your Password" required>
                <p class="cursor-pointer ml-60 mt-5">Forgot Password?</p>
                <a href="dashboard.html" class="mt-5 block w-full text-center bg-black text-white font-bold py-3 rounded-xl shadow-lg shadow-purple-500/20 hover:opacity-90 transition cursor-pointer">
                    Login
                </a>                
                <p class="flex justify-center mt-8">or continue with</p>

                <div class="flex justify-between p-1 mt-7 text-6xl cursor-pointer">
                     <i class="fa-brands fa-google"></i>
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-apple"></i>
                 </div>

                <div class="flex justify-between mt-10">
                     <p class="ml-50">New operator?</p>
                     <a href="register.html"><p class="text-blue-400 cursor-pointer"> create an account</a>
                             
                   </p>  
                </div>
            </form>
            
        </div>
      </div>
    </section>
    
</body>
</html>
